<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TacticalDropz – 40K Deployment Planner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="banner">
    <div class="banner-text">⚠️ Demo site, under development. Please give me feedback so I can improve the site! ⚠️</div>
  </div>

  <div class="container">

    <div class="top-nav" id="topNav">
      <!-- Built dynamically by script -->
    </div>

    <div class="main-content">

      <div class="left-sidebar" id="leftSidebar">
        <div class="sidebar-header">Mission</div>
        <!-- Built dynamically -->
      </div>

      <div class="canvas-area">

        <div class="toolbar">
          <div class="toolbar-section">
            <button class="tool-btn active" data-tool="draw">✏️ Draw Unit</button>
            <button class="tool-btn" data-tool="measure">📏 Measure</button>
            <button class="tool-btn" data-tool="label">🏷️ Label</button>
            <button class="tool-btn" data-tool="sight">👁️ Line of Sight</button>
          </div>

          <div class="toolbar-section">
            <span class="toolbar-label">Color:</span>
            <div class="color-picker">
              <div class="color-swatch active" style="background:#00ff00" data-color="#00ff00"></div>
              <div class="color-swatch" style="background:#ff0000" data-color="#ff0000"></div>
              <div class="color-swatch" style="background:#0080ff" data-color="#0080ff"></div>
              <div class="color-swatch" style="background:#ffff00" data-color="#ffff00"></div>
              <div class="color-swatch" style="background:#ff00ff" data-color="#ff00ff"></div>
            </div>
          </div>

          <div class="toolbar-section">
            <input type="text" id="unitName" placeholder="Unit name..." style="width:140px;">
          </div>

          <div class="toolbar-section" id="placeModelsSection">
            <button class="tool-btn" data-tool="models">🪖 Place Models</button>
            <button class="tool-btn tool-btn-info" onclick="showModelsHelp()" title="How to use Place Models">ⓘ</button>
            <select id="baseSize" class="nav-select" style="width:90px;" onchange="updateRotationVisibility()">
              <option value="25">25mm</option>
              <option value="28">28mm</option>
              <option value="32" selected>32mm</option>
              <option value="40">40mm</option>
              <option value="50">50mm</option>
              <option value="60">60mm</option>
              <option value="60x35">60x35mm</option>
              <option value="70">70mm</option>
              <option value="75x42">75x42mm</option>
              <option value="80">80mm</option>
              <option value="90">90mm</option>
              <option value="90x52">90x52mm</option>
              <option value="100">100mm</option>
              <option value="105x70">105x70mm</option>
              <option value="120x92">120x92mm</option>
              <option value="130">130mm</option>
              <option value="150x95">150x95mm</option>
              <option value="160">160mm</option>
              <option value="170x105">170x105mm</option>
            </select>
            <select id="baseRotation" class="nav-select" style="width:60px; display:none;" title="Oval rotation">
              <option value="0">0°</option>
              <option value="90">90°</option>
            </select>
            <div class="model-count-group">
              <button class="count-btn" onclick="setModelCount(1)">1</button>
              <button class="count-btn" onclick="setModelCount(5)">5</button>
              <button class="count-btn" onclick="setModelCount(10)">10</button>
              <input type="number" id="modelCount" value="5" min="1" max="30" style="width:44px;">
            </div>
          </div>

          <div class="toolbar-section">
            <button class="tool-btn" onclick="clearCanvas()">🗑️ Clear</button>
            <button class="tool-btn" onclick="savePlan()">💾 Save</button>
            <button class="tool-btn" onclick="loadPlan()">📂 Load</button>
          </div>
        </div>

        <div class="canvas-with-sidebar">
          <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="battlefield" width="900" height="660"></canvas>
          </div>

          <div class="right-sidebar" id="rightSidebar">
            <div class="sidebar-header">Units</div>
            <div id="unitsList"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Modal ── -->
  <div id="modalOverlay" class="modal-overlay" style="display:none">
    <div class="modal-box" id="modalBox">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-body" id="modalBody"></div>
      <input type="text" id="modalInput" class="modal-input" style="display:none" placeholder="">
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
