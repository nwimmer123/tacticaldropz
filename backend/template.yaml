AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TacticalDropz Backend

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        BASE_SIZES_TABLE: !Ref BaseSizesTable
        LISTS_TABLE: !Ref ListsTable
        DEPLOYMENTS_TABLE: !Ref DeploymentsTable
        USER_POOL_ID: !Ref UserPool
        USER_POOL_CLIENT_ID: !Ref UserPoolClient
        PROMO_CODES_TABLE: !Ref PromoCodesTable
        SES_FROM_EMAIL: "noreply@tacticaldropz.com"
        APP_URL: "https://tacticaldropz.com"
        STRIPE_PRICE_LOOKUP_KEY: "TacticalDropzPro-c005ef8"
        STRIPE_PRICE_ID: "price_1TBPlrR4Uvswi4uSqDy9oFwp"
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'https://tacticaldropz.com'"

Resources:

  # ── Cognito ──────────────────────────────────────────────────────────────────

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: tacticaldropz-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      EmailConfiguration:
        EmailSendingAccount: DEVELOPER
        From: noreply@tacticaldropz.com
        SourceArn: !Sub "arn:aws:ses:us-west-2:${AWS::AccountId}:identity/tacticaldropz.com"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: stripeCustomerId
          AttributeDataType: String
          Required: false
          Mutable: true
        - Name: subscriptionStatus
          AttributeDataType: String
          Required: false
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: tacticaldropz-web
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      GenerateSecret: false
      AccessTokenValidity: 24
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        RefreshToken: days

  # ── DynamoDB Tables ───────────────────────────────────────────────────────────

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tacticaldropz-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  BaseSizesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tacticaldropz-base-sizes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: unitKey
          AttributeType: S
        - AttributeName: edition
          AttributeType: S
      KeySchema:
        - AttributeName: unitKey
          KeyType: HASH
        - AttributeName: edition
          KeyType: RANGE

  ListsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tacticaldropz-lists
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: listId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: listId
          KeyType: RANGE

  DeploymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tacticaldropz-deployments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: deploymentId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: deploymentId
          KeyType: RANGE

  PromoCodesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tacticaldropz-promo-codes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: code
          AttributeType: S
      KeySchema:
        - AttributeName: code
          KeyType: HASH

  # ── API Gateway ───────────────────────────────────────────────────────────────

  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'https://tacticaldropz.com'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'https://tacticaldropz.com'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'https://tacticaldropz.com'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn
            Identity:
              Header: Authorization
            AuthorizationScopes:
              - aws.cognito.signin.user.admin

  # ── Lambda Functions ──────────────────────────────────────────────────────────

  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/users/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminDeleteUser
              Resource: !GetAtt UserPool.Arn
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/tacticaldropz/stripe/*"
      Events:
        SignUp:
          Type: Api
          Properties:
            Path: /users/signup
            Method: post
            RestApiId: !Ref ApiGateway
        Verify:
          Type: Api
          Properties:
            Path: /users/verify
            Method: post
            RestApiId: !Ref ApiGateway
        ForgotPassword:
          Type: Api
          Properties:
            Path: /users/forgot-password
            Method: post
            RestApiId: !Ref ApiGateway
        ConfirmResetPassword:
          Type: Api
          Properties:
            Path: /users/confirm-reset-password
            Method: post
            RestApiId: !Ref ApiGateway
        ResendVerification:
          Type: Api
          Properties:
            Path: /users/resend-verification
            Method: post
            RestApiId: !Ref ApiGateway
        SignIn:
          Type: Api
          Properties:
            Path: /users/signin
            Method: post
            RestApiId: !Ref ApiGateway
        GetProfile:
          Type: Api
          Properties:
            Path: /users/profile
            Method: get
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        UpdateProfile:
          Type: Api
          Properties:
            Path: /users/profile
            Method: put
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        DeleteAccount:
          Type: Api
          Properties:
            Path: /users/account
            Method: delete
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer

  BaseSizesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/baseSizes/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BaseSizesTable
      Events:
        GetBaseSizes:
          Type: Api
          Properties:
            Path: /bases
            Method: get
            RestApiId: !Ref ApiGateway
        SubmitBaseSize:
          Type: Api
          Properties:
            Path: /bases
            Method: post
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        VoteBaseSize:
          Type: Api
          Properties:
            Path: /bases/{unitKey}/vote
            Method: post
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer

  ListsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/lists/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ListsTable
      Events:
        GetLists:
          Type: Api
          Properties:
            Path: /lists
            Method: get
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        CreateList:
          Type: Api
          Properties:
            Path: /lists
            Method: post
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        GetList:
          Type: Api
          Properties:
            Path: /lists/{listId}
            Method: get
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        UpdateList:
          Type: Api
          Properties:
            Path: /lists/{listId}
            Method: put
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        DeleteList:
          Type: Api
          Properties:
            Path: /lists/{listId}
            Method: delete
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer

  DeploymentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/deployments/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DeploymentsTable
      Events:
        GetDeployments:
          Type: Api
          Properties:
            Path: /deployments
            Method: get
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        CreateDeployment:
          Type: Api
          Properties:
            Path: /deployments
            Method: post
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        GetDeployment:
          Type: Api
          Properties:
            Path: /deployments/{deploymentId}
            Method: get
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        UpdateDeployment:
          Type: Api
          Properties:
            Path: /deployments/{deploymentId}
            Method: put
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        DeleteDeployment:
          Type: Api
          Properties:
            Path: /deployments/{deploymentId}
            Method: delete
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer

  EmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/email/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        SendEmail:
          Type: Api
          Properties:
            Path: /email/send
            Method: post
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer

  PromoCodesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/promoCodes/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PromoCodesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        RedeemCode:
          Type: Api
          Properties:
            Path: /promo/redeem
            Method: post
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        CreateCode:
          Type: Api
          Properties:
            Path: /promo/create
            Method: post
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        GetCode:
          Type: Api
          Properties:
            Path: /promo/{code}
            Method: get
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer

  StripeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/stripe/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/tacticaldropz/stripe/*"
      Events:
        CreateCheckout:
          Type: Api
          Properties:
            Path: /stripe/create-checkout
            Method: post
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        CreatePortal:
          Type: Api
          Properties:
            Path: /stripe/create-portal
            Method: post
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: CognitoAuthorizer
        Webhook:
          Type: Api
          Properties:
            Path: /stripe/webhook
            Method: post
            RestApiId: !Ref ApiGateway

# ── Outputs ───────────────────────────────────────────────────────────────────

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod"
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
